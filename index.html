<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>性格診断テスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>性格診断テスト</h1>
    <p>直感で一番近いと思うものを選んでください。</p>

    <form id="quiz-form">
      <!-- Q1 -->
      <div class="question">
        <h2>Q1. 休みの日はどんな過ごし方が好き？</h2>
        <label>
          <input type="radio" name="q1" value="E">
          友達と出かけてワイワイしたい
        </label>
        <label>
          <input type="radio" name="q1" value="I">
          家でゆっくり一人時間を楽しみたい
        </label>
      </div>

      <!-- Q2 -->
      <div class="question">
        <h2>Q2. 新しいことを始めるときの気持ちは？</h2>
        <label>
          <input type="radio" name="q2" value="N">
          ワクワクする、とりあえずやってみたい
        </label>
        <label>
          <input type="radio" name="q2" value="S">
          ちゃんと情報を集めてから慎重に考えたい
        </label>
      </div>

      <!-- Q3 -->
      <div class="question">
        <h2>Q3. 人の相談を聞くとき、どんなスタイル？</h2>
        <label>
          <input type="radio" name="q3" value="F">
          気持ちに寄りそって共感しながら話を聞く
        </label>
        <label>
          <input type="radio" name="q3" value="T">
          状況を整理して、解決策を一緒に考える
        </label>
      </div>

      <button type="button" id="submit-btn">診断する</button>
    </form>

    <div id="result" class="result hidden">
      <h2>診断結果</h2>
      <p id="result-type"></p>
      <p id="result-text"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
